<script>
// Accordion 
function myAccFunc(id) {
  var x = document.getElementById("demoAcc-"+id);
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else {
    x.className = x.className.replace(" w3-show", "");
  }
}

// Click on the "Jeans" link on page load to open the accordion for demo purposes
document.getElementById("myBtn").click();


// Open and close sidebar
function w3_open() {
  document.getElementById("mySidebar").style.display = "block";
  document.getElementById("myOverlay").style.display = "block";
}
 
function w3_close() {
  document.getElementById("mySidebar").style.display = "none";
  document.getElementById("myOverlay").style.display = "none";
}
</script>
<script>
        const meses = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];
        const diasSemana = ["Lu", "Ma", "Mi", "Ju", "Vi", "Sá", "Do"];

        function generateCustomAlmanac() {
            const startVal = "2025-09-28";
            const endVal = "2026-09-27";

            if (!startVal || !endVal) {
                alert("Por favor, selecciona ambas fechas.");
                return;
            }

            const startDate = new Date(startVal + 'T00:00:00');
            const endDate = new Date(endVal + 'T00:00:00');

            if (startDate > endDate) {
                alert("La fecha inicial no puede ser posterior a la fecha final.");
                return;
            }

            const startYear = startDate.getFullYear();
            const endYear = endDate.getFullYear();

            const output = document.getElementById('almanacOutput');
            output.innerHTML = '';

            const yearSection = document.createElement('div');
            yearSection.className = 'year-section';

            const grid = document.createElement('div');
            grid.className = 'calendar-grid';



            // Recorrer los años implicados
            for (let year = startYear; year <= endYear; year++) {
                // Determinar qué meses de este año se van a pintar
                let startMonth = (year === startYear) ? startDate.getMonth() : 0;
                let endMonth = (year === endYear) ? endDate.getMonth() : 11;

                // Si no hay meses que pintar en este año, saltar (caso raro de seguridad)
                if (startMonth > endMonth && year === startYear && year === endYear) continue;
                
                for (let month = startMonth; month <= endMonth; month++) {
                    const card = document.createElement('div');
                    const monthName  = `${meses[month]}-${year}`.toLowerCase();
                    const monthLabel = month < 9? `0${month}` : `${month}`;
                    card.className = 'month-card';

                    const title = document.createElement('div');
                    title.className = 'month-title';
                    title.innerText = `${meses[month]} - ${year}`;
                    
                    card.appendChild(title);

                    const weekdaysDiv = document.createElement('div');
                    weekdaysDiv.className = 'weekdays';
                    diasSemana.forEach(d => {
                        const dayName = document.createElement('div');
                        dayName.innerText = d;
                        weekdaysDiv.appendChild(dayName);
                    });
                    card.appendChild(weekdaysDiv);

                    const daysDiv = document.createElement('div');
                    daysDiv.className = 'days';

                    let firstDayIndex = new Date(year, month, 1).getDay();
                    let adjustedFirstDay = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
                    const totalDays = new Date(year, month + 1, 0).getDate();

                    // Rellenar días vacíos al inicio de la semana
                    for (let i = 0; i < adjustedFirstDay; i++) {
                        const emptyDay = document.createElement('div');
                        emptyDay.className = 'day empty';
                        daysDiv.appendChild(emptyDay);
                    }

                    // Iterar por los días reales del mes
                    for (let day = 1; day <= totalDays; day++) {
                        const dayLabel = day < 10 ? `0${day}` : `${day}`;
                        const dayDiv = document.createElement('div');
                        const currentFullDate = new Date(year, month, day);

                        // Determinar estilo según si está dentro del rango estricto de días escogidos
                        if (currentFullDate >= startDate && currentFullDate <= endDate) {
                          ahref = document.createElement('a');
                          ahref.innerHTML = day; 
                          ahref.href = '{{site.baseurl}}/' + monthName + '/' + year + "/" + monthLabel + "/" + dayLabel + "/I.html"; 
                          dayDiv.appendChild(ahref); 
                          dayDiv.classList.add('in-range');
                        } else {
                          dayDiv.className = 'day';
                          dayDiv.innerText = day;
                          dayDiv.classList.add('out-of-range');
                        }

                        // Marcar domingos
                        let currentDayOfWeek = (adjustedFirstDay + day - 1) % 7;
                        if (currentDayOfWeek === 6) {
                            dayDiv.classList.add('sunday');
                        }

                        daysDiv.appendChild(dayDiv);
                    }

                    card.appendChild(daysDiv);
                    grid.appendChild(card);
                }

               
            }
            yearSection.appendChild(grid);
            output.appendChild(yearSection);
        }

        // Ejecución inicial por defecto
        generateCustomAlmanac();

        function verifyPostExists(day, month, year) {    
          const targetUrl = "/" + {month} + "-" + {year} + "/" + {year} + "/" + {month} + "/" + {day} + "/" + {day} + ".markdown"; 
          try {
            const response = fetch(targetUrl, { method: 'HEAD' });
            return response.ok; // Returns true if status is 200-299
          } catch {
            return false; // Returns false if network error or 404
          }
        }
          
    </script>
