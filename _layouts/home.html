<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almanaque Dinámico 2025</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --sunday: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .btn.active, .btn:hover {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .month-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .month-title {
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
            color: var(--text-main);
            text-transform: capitalize;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 5px;
        }

        .day {
            padding: 8px 0;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            color: var(--text-main);
        }

        .day.empty {
            color: transparent;
        }

        .day.sunday {
            color: var(--sunday);
            font-weight: 600;
        }

        .day:not(.empty):hover {
            background-color: #f1f5f9;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="yearHeader">Almanaque 2025</h1>
            <p class="subtitle">Generación interactiva con HTML, CSS y JavaScript nativo</p>
        </header>

        <div class="controls">
            <button class="btn active" onclick="changeYear(2025)">Año 2025</button>
            <button class="btn" onclick="changeYear(2026)">Año 2026</button>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="footer">
            Almanaque Interactivo v2.0 • Renderizado dinámico en tiempo de ejecución
        </div>
    </div>

    <script>
        const meses = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];
        
        const diasSemana = ["Lu", "Ma", "Mi", "Ju", "Vi", "Sá", "Do"];

        function renderCalendar(year) {
            document.getElementById('yearHeader').innerText = `Almanaque ${year}`;
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let month = 0; month < 12; month++) {
                const card = document.createElement('div');
                card.className = 'month-card';

                const title = document.createElement('div');
                title.className = 'month-title';
                title.innerText = meses[month];
                card.appendChild(title);

                const weekdaysDiv = document.createElement('div');
                weekdaysDiv.className = 'weekdays';
                diasSemana.forEach(d => {
                    const dayName = document.createElement('div');
                    dayName.innerText = d;
                    weekdaysDiv.appendChild(dayName);
                });
                card.appendChild(weekdaysDiv);

                const daysDiv = document.createElement('div');
                daysDiv.className = 'days';

                // Primer día del mes (0 = Domingo, 1 = Lunes, etc.)
                let firstDayIndex = new Date(year, month, 1).getDay();
                // Ajustar para que la semana empiece en Lunes (0 -> Lu, 6 -> Do)
                // En JS: 0=Dom, 1=Lun, 2=Mar, 3=Mie, 4=Jue, 5=Vie, 6=Sab
                let adjustedFirstDay = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

                const totalDays = new Date(year, month + 1, 0).getDate();

                // Espacios vacíos
                for (let i = 0; i < adjustedFirstDay; i++) {
                    const emptyDay = document.createElement('div');
                    emptyDay.className = 'day empty';
                    emptyDay.innerText = '';
                    daysDiv.appendChild(emptyDay);
                }

                // Días del mes
                for (let day = 1; day <= totalDays; day++) {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day';
                    dayDiv.innerText = day;

                    // Verificar si es Domingo
                    let currentDayOfWeek = (adjustedFirstDay + day - 1) % 7;
                    if (currentDayOfWeek === 6) {
                        dayDiv.classList.add('sunday');
                    }

                    daysDiv.appendChild(dayDiv);
                }

                card.appendChild(daysDiv);
                grid.appendChild(card);
            }
        }

        function changeYear(year) {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                if (btn.innerText.includes(year)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderCalendar(year);
        }

        // Inicializar
        renderCalendar(2025);
    </script>
</body>
</html>
